<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
    }
    body {
      background: #f8faff;
      color: #1e1e2f;
      line-height: 1.6;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(0, 20, 80, 0.08);
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0b2b7a, #1e4fd9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .logo i {
      -webkit-text-fill-color: #1e4fd9;
      margin-right: 6px;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      font-weight: 500;
      color: #2d3a5e;
    }
    .nav-links a {
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: #1e4fd9;
    }
    .btn-primary {
      background: #1e4fd9;
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 14px rgba(30, 79, 217, 0.25);
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #0b2b7a;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(30, 79, 217, 0.3);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #1e4fd9;
      color: #1e4fd9;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 600;
      transition: 0.2s;
      cursor: pointer;
    }
    .btn-outline:hover {
      background: #1e4fd9;
      color: white;
    }
    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 50px 0 40px;
      gap: 30px;
    }
    .hero-text {
      flex: 1 1 400px;
    }
    .hero-text h1 {
      font-size: 3.2rem;
      font-weight: 800;
      line-height: 1.2;
      color: #0b1a3a;
    }
    .hero-text h1 span {
      background: linear-gradient(135deg, #1e4fd9, #7b9cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-text p {
      font-size: 1.2rem;
      color: #3d4e72;
      margin: 20px 0 28px;
      max-width: 500px;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    .hero-stats {
      display: flex;
      gap: 40px;
      margin-top: 40px;
    }
    .hero-stats div {
      text-align: left;
    }
    .hero-stats h3 {
      font-size: 2rem;
      color: #0b2b7a;
    }
    .hero-stats p {
      font-size: 0.9rem;
      color: #5b6d92;
      margin: 0;
    }
    .hero-image {
      flex: 1 1 350px;
      background: linear-gradient(145deg, #e6edff, #d4e0ff);
      border-radius: 40px;
      padding: 20px 20px 10px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(30, 79, 217, 0.12);
    }
    .hero-image i {
      font-size: 10rem;
      color: #1e4fd9;
      opacity: 0.9;
      filter: drop-shadow(0 12px 14px rgba(30, 79, 217, 0.2));
    }
    .hero-image p {
      font-weight: 600;
      color: #1e2d5a;
      margin-top: 4px;
    }
    .section-title {
      font-size: 2.4rem;
      font-weight: 700;
      margin: 60px 0 20px;
      color: #0b1a3a;
      text-align: center;
    }
    .section-sub {
      text-align: center;
      color: #4a5e84;
      max-width: 600px;
      margin: 0 auto 40px;
    }
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 30px;
      margin: 30px 0 20px;
    }
    .feature-card {
      background: white;
      border-radius: 28px;
      padding: 30px 20px;
      box-shadow: 0 8px 24px rgba(0, 20, 60, 0.06);
      transition: 0.3s ease;
      text-align: center;
      border: 1px solid #f0f4ff;
    }
    .feature-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(30, 79, 217, 0.08);
      border-color: #c6d8ff;
    }
    .feature-card i {
      font-size: 2.6rem;
      color: #1e4fd9;
      background: #eef4ff;
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 18px;
    }
    .feature-card h3 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
    .feature-card p {
      color: #52658c;
    }
    .pricing {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin: 40px 0 60px;
    }
    .pricing-card {
      background: white;
      border-radius: 32px;
      padding: 32px 28px;
      flex: 1 1 250px;
      max-width: 300px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      border: 1px solid #eef3fe;
      transition: 0.25s;
      text-align: center;
    }
    .pricing-card.popular {
      border: 2px solid #1e4fd9;
      background: #fafcff;
      position: relative;
    }
    .pricing-card.popular::after {
      content: "POPULER";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e4fd9;
      color: white;
      padding: 2px 18px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .pricing-card h4 {
      font-size: 1.6rem;
      font-weight: 700;
    }
    .pricing-card .price {
      font-size: 2.8rem;
      font-weight: 800;
      color: #0b2b7a;
      margin: 16px 0 6px;
    }
    .pricing-card .price small {
      font-size: 1rem;
      font-weight: 400;
      color: #6476a0;
    }
    .pricing-card ul {
      list-style: none;
      margin: 24px 0;
      text-align: left;
      padding-left: 6px;
    }
    .pricing-card ul li {
      padding: 8px 0;
      border-bottom: 1px solid #f0f4fe;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pricing-card ul li i {
      color: #1e4fd9;
      width: 20px;
    }
    .pricing-card .btn-primary {
      width: 100%;
      justify-content: center;
      box-shadow: none;
    }
    .testimonial {
      background: white;
      border-radius: 40px;
      padding: 40px 30px;
      margin: 40px 0 60px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.02);
      border: 1px solid #eaf0ff;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
    }
    .testimonial blockquote {
      font-size: 1.3rem;
      font-style: italic;
      color: #162449;
      max-width: 600px;
    }
    .testimonial blockquote i {
      color: #1e4fd9;
      margin-right: 8px;
    }
    .testimonial .user {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .testimonial .user i {
      font-size: 3rem;
      color: #0b2b7a;
      background: #e3edff;
      padding: 12px;
      border-radius: 60px;
    }
    .testimonial .user div {
      font-weight: 600;
    }
    .testimonial .user span {
      font-weight: 400;
      color: #5670a2;
    }
    .cta-form {
      background: linear-gradient(145deg, #0b1f4a, #12317c);
      border-radius: 48px;
      padding: 50px 40px;
      color: white;
      margin: 30px 0 60px;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: center;
      justify-content: space-between;
    }
    .cta-form h2 {
      font-size: 2.2rem;
      font-weight: 700;
    }
    .cta-form p {
      opacity: 0.85;
      margin: 10px 0 18px;
      max-width: 400px;
    }
    .cta-form .form-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }
    .cta-form input {
      padding: 14px 20px;
      border-radius: 60px;
      border: none;
      min-width: 220px;
      font-size: 1rem;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .cta-form input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .cta-form input:focus {
      outline: none;
      background: rgba(255,255,255,0.2);
    }
    .cta-form .btn-primary {
      background: white;
      color: #0b2b7a;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }
    .cta-form .btn-primary:hover {
      background: #eef4ff;
    }
    footer {
      border-top: 1px solid #e2ecff;
      padding: 30px 0 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: #3b4c72;
    }
    footer .social i {
      font-size: 1.4rem;
      margin-left: 20px;
      color: #2a4070;
      transition: 0.2s;
    }
    footer .social i:hover {
      color: #1e4fd9;
    }
    footer small {
      opacity: 0.7;
    }
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 16px;
      }
      .nav-links {
        gap: 18px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .hero-text h1 {
        font-size: 2.4rem;
      }
      .hero-stats {
        gap: 24px;
        flex-wrap: wrap;
      }
      .cta-form {
        flex-direction: column;
        text-align: center;
      }
      .cta-form .form-group {
        justify-content: center;
      }
      .pricing-card {
        max-width: 100%;
      }
      .testimonial {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="logo">
        <i class="fas fa-wifi"></i> RGN
      </div>
      <div class="nav-links">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </div>
      <a href="https://my.rgn.biz.id/auth/register" class="btn-primary"><i class="fas fa-user-plus"></i> Daftar</a>
    </nav>

    {{ block "main" . }}{{ end }}

    <footer>
      <div>
        <span style="font-weight:600; color:#0b2b7a;">RGN Internet</span> &copy; {{ now.Format "2006" }} — Cepat, stabil, modern.
      </div>
      <div class="social">
        <i class="fab fa-facebook"></i>
        <i class="fab fa-twitter"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-youtube"></i>
      </div>
    </footer>
  </div>
</body>
</html>
